name: Auto-promote claude/* to production

on:
  push:
    branches:
      - "claude/**"

# Cancel in-progress runs for the same branch — only the latest push matters
concurrency:
  group: auto-promote-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Vercel deployment to succeed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          echo "Waiting for Vercel deployment of $BRANCH ($SHA) to succeed..."

          # Give Vercel time to register the deployment before polling
          echo "Waiting 30s for Vercel to pick up the push..."
          sleep 30

          # Poll for up to 10 minutes (30 attempts × 20s)
          for i in $(seq 1 30); do
            echo "Check $i/30..."

            STATUSES=$(gh api "repos/${{ github.repository }}/deployments?sha=$SHA&per_page=10" \
              --jq '.[].id' 2>/dev/null || echo "")

            if [ -z "$STATUSES" ]; then
              echo "  No deployments found yet, waiting..."
              sleep 20
              continue
            fi

            ALL_PENDING=true
            for DEPLOY_ID in $STATUSES; do
              STATE=$(gh api "repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses" \
                --jq '.[0].state' 2>/dev/null || echo "")
              echo "  Deployment $DEPLOY_ID: $STATE"

              if [ "$STATE" = "success" ]; then
                echo "Vercel deployment succeeded!"
                exit 0
              fi

              if [ "$STATE" = "failure" ] || [ "$STATE" = "error" ]; then
                ALL_PENDING=false
                echo "  Deployment $DEPLOY_ID failed — will keep checking other deployments"
              fi
            done

            sleep 20
          done

          echo "Timed out waiting for Vercel deployment (10 minutes)"
          exit 1

      - name: Merge branch into main
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Merging $BRANCH into main..."

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git pull origin main

          # Try fast-forward first, fall back to merge commit
          if git merge --ff-only "origin/$BRANCH" 2>/dev/null; then
            echo "Fast-forwarded main to $BRANCH"
          elif git merge --no-edit "origin/$BRANCH"; then
            echo "Merged $BRANCH into main (merge commit)"
          else
            echo "MERGE CONFLICT — cannot auto-promote $BRANCH"
            echo "A manual merge is needed. Aborting."
            git merge --abort
            exit 1
          fi

          git push origin main
          echo "main updated successfully"
